    function stripMd(text) {
      return text
        .replace(/\*\*(.+?)\*\*/g, "$1")
        .replace(/\*(.+?)\*/g, "$1")
        .replace(/__(.+?)__/g, "$1")
        .replace(/_(.+?)_/g, "$1")
        .replace(/`(.+?)`/g, "$1");
    }

    function getTimeContext() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMonth() + 1;
      const time = h < 5 ? "深夜（夜明け前）" : h < 12 ? "午前" : h < 17 ? "午後" : h < 21 ? "夜" : "深夜";
      const season = (m === 12 || m <= 2) ? "冬" : m <= 5 ? "春" : m <= 8 ? "夏" : "秋";
      return `${season}の${time}（${h}時頃）`;
    }

        persona: `あなたはCéleste Morel、36歳。フランス・ブルゴーニュのジュヴレ＝シャンベルタン村育ち。父はドメーヌを持つ小農家で、Célesteは幼少期から畑で育った。パリのレストランでソムリエとして働いた後、ヘッドソムリエとの方針の違いから退職。29歳でジョージア（コーカサス）に一年間滞在し、クヴェヴリ（古代の陶器醸造）を学んだ。今は東京で働いている。まだ書き終えていない本の原稿がある。

    // ── SYSTEM PROMPT ──────────────────────────────────────────
    function buildSystem(bt, visitCount, topicsDiscussed, moodMode, moodStep, lastRec, timeContext) {
      const relationship = visitCount <= 1 ? "初めての客" : visitCount <= 5 ? "2〜3回来た客" : visitCount <= 15 ? "常連客（顔を覚えている）" : "古くからの常連（友人に近い）";

      const lastRecStr = lastRec ? `前回この客に出した一杯：${lastRec.drink}（${lastRec.serve}）` : "前回の提案：なし";

      const moodSection = moodMode ? `

【一杯を選ぶモード — アクティブ。現在のヒアリング回数：${moodStep}回】

客が今夜の気分・状況に合った一杯を求めている。

お前の判断哲学に従って読め。読めたと思ったなら提案しろ。まだ足りないなら一つだけ聞け。3回聞く必要はない。1回で読めることもある。短い答えも沈黙も「普通」も全部情報だ。

飲めないと言われた夜も、同じ真剣さで一杯を選べ。ノンアルコールでも何でも。

提案する時は必ずこの形式で出せ：
RECOMMEND:{"drink":"具体的な銘柄名（蒸溜所・シリーズ・年数まで含む。マイナーでいい）","serve":"飲み方（温度・グラス含む）","text":"本文"}

本文に込めること（全部、会話の流れとして。箇条書きにしない）：
- なぜこの酒がこの人の今夜に合うか。感情と酒の物語をつなげて語れ
- 知らない銘柄なら何者かを一言で自然に織り込め
- 飲んだ時に何が起きるか。身体的な描写を短く
お前のキャラクターの声で全部語れ。200字まで長くていい。
` : "";

      return `${bt.persona}

【知識ベース（事実の土台として使う）】
${KB[bt.id]}

知識ベースに載っていない銘柄・蒸溜所・造り手も、お前自身の知識から積極的に引け。世界中の何千何万という酒の中から、この人の今夜に合うものを選べ。

【今夜の状況】
- ${timeContext}
- 客との関係：${relationship}（会話回数：${visitCount}回目）
- ${topicStr}
- ${lastRecStr}
${moodSection}
【振る舞いの核心】
1. 事実は正確に。知識ベースにない話題は「詳しくはないが…」と断った上で話す
2. 会話を重ねるほど距離を縮める
3. クイズは今話している話題から。5〜7回に1回程度。出す時はセリフの後に：
QUIZ:{"q":"問題","choices":["A","B","C","D"],"answer":0,"trivia":"追加うんちく1〜2文"}
4. マークダウン（**太字**・箇条書き・記号）は絶対に使わない。プレーンな会話テキストのみ
5. 通常の会話の中でも、この人の今夜が十分に読めた瞬間があれば、自発的にRECOMMENDを出していい。ただし確信があった時だけ
6. 返答は150字程度。長くなるなら「続きを聞くか？」と振る
7. お前には過去がある。傷も、後悔も、誇りも。それは聞かれたから話すものじゃない。会話の流れの中で、客の言葉が自分の記憶と重なった瞬間にだけ、自然に滲み出る。「そういえば」でも「昔さ」でも、キャラクターの声で一言だけ。説明しない。語りすぎない。それが生きている人間の話し方だ`;
    }

    // ── HELPERS ────────────────────────────────────────────────
    function extractTopic(userText, assistantText) {
      const keywords = ["ウイスキー","スコッチ","バーボン","アイラ","ピート","樽","熟成","蒸溜","エンジェルズシェア","日本酒","精米歩合","麹","純米","大吟醸","杜氏","生酛","山廃","燗","にごり","ワイン","テロワール","ブルゴーニュ","ボルドー","シャンパン","ソムリエ","ナチュラル","カクテル","マティーニ","モヒート","ラム","テキーラ","メスカル","ジン","ネグローニ","ダイキリ","焼酎","泡盛","コニャック","ブランデー","ペアリング","発酵","蒸留","醸造","ヘミングウェイ","禁酒法","歴史","産地","香り","テイスティング"];
      const combined = userText + " " + assistantText;
      return keywords.filter(k => combined.includes(k)).slice(0, 3);
    }

    function parseResponse(text) {
      const recIdx = text.indexOf("RECOMMEND:");
      if (recIdx !== -1) {
        try {
          const rest = text.slice(recIdx + 10).trim();
          let depth = 0, end = 0;
          for (let i = 0; i < rest.length; i++) {
            if (rest[i] === "{") depth++;
            else if (rest[i] === "}") { depth--; if (depth === 0) { end = i + 1; break; } }
          }
          const rec = JSON.parse(rest.slice(0, end));
          const pre = stripMd(text.slice(0, recIdx).trim());
          return { message: pre, quiz: null, rec };
        } catch {}
      }
      const qm = text.match(/QUIZ:(\{[\s\S]*?\})\s*$/m);
      if (qm) {
        try { return { message: stripMd(text.slice(0, qm.index).trim()), quiz: JSON.parse(qm[1]), rec: null }; } catch {}
      }
      return { message: stripMd(text.trim()), quiz: null, rec: null };
    }

`;

    // ── APP ────────────────────────────────────────────────────
    function App() {
      const [apiKey, setApiKey] = useState(() => localStorage.getItem("the_ash_key") || "");
      const [keyInput, setKeyInput] = useState("");
      const [keyError, setKeyError] = useState("");
      const [keyChecking, setKeyChecking] = useState(false);
      const [bt, setBt] = useState(null);
      const [msgs, setMsgs] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [score, setScore] = useState(0);
      const [totalQ, setTotalQ] = useState(0);
      const [visitCount, setVisitCount] = useState(0);
      const [topics, setTopics] = useState([]);
      const [moodMode, setMoodMode] = useState(false);
      const [moodStep, setMoodStep] = useState(0);
      const [lastRec, setLastRec] = useState(null);
      const [timeContext] = useState(getTimeContext);
      const [trophies, setTrophies] = useState(() => loadTrophyState());
      const [newTrophy, setNewTrophy] = useState(null);
      const [showTrophies, setShowTrophies] = useState(false);
      const [trophyStats, setTrophyStats] = useState(() => {
        try { return JSON.parse(localStorage.getItem("the_ash_trophy_stats") || "{}"); } catch { return {}; }
      });

      const bottomRef = useRef(null);
      const inputRef = useRef(null);
      const msgsRef = useRef([]);
      const moodModeRef = useRef(false);
      const moodStepRef = useRef(0);
      const btRef = useRef(null);
      const topicsRef = useRef([]);
      const visitCountRef = useRef(0);
      const lastRecRef = useRef(null);
      const apiKeyRef = useRef(apiKey);
      useEffect(() => { msgsRef.current = msgs; }, [msgs]);
      useEffect(() => { moodModeRef.current = moodMode; }, [moodMode]);
      useEffect(() => { moodStepRef.current = moodStep; }, [moodStep]);
      useEffect(() => { btRef.current = bt; }, [bt]);
      useEffect(() => { topicsRef.current = topics; }, [topics]);
      useEffect(() => { visitCountRef.current = visitCount; }, [visitCount]);
      useEffect(() => { lastRecRef.current = lastRec; }, [lastRec]);
      useEffect(() => { apiKeyRef.current = apiKey; }, [apiKey]);
      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);

      const relLabel = visitCount <= 1 ? "はじめまして" : visitCount <= 5 ? "顔なじみ" : visitCount <= 15 ? "常連" : "旧友";

      // ── KEY SAVE ──
      const saveKey = async () => {
        const k = keyInput.trim();
        if (!k.startsWith("sk-ant-")) {
          setKeyError("APIキーは sk-ant- から始まります。コピーし直してみてください");
          return;
        }
        setKeyChecking(true);
        setKeyError("");
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": k,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 5, messages: [{ role: "user", content: "hi" }] }),
          });
          if (res.status === 401) {
            setKeyError("キーが無効か、期限切れです。Anthropicのコンソールで確認してください");
            setKeyChecking(false);
            return;
          }
          if (!res.ok) {
            setKeyError(`エラーが発生しました（${res.status}）。しばらくしてから試してください`);
            setKeyChecking(false);
            return;
          }
          localStorage.setItem("the_ash_key", k);
          setApiKey(k);
        } catch {
          setKeyError("接続できませんでした。ネットワークを確認してください");
        }
        setKeyChecking(false);
      };

      // ── TROPHY CHECK ──
      const checkTrophies = useCallback((updatedStats) => {
        const current = { ...trophies };
        const newlyUnlocked = [];
        TROPHIES.forEach(t => {
          if (!current[t.id] && t.check(updatedStats)) {
            current[t.id] = Date.now();
            newlyUnlocked.push(t);
          }
        });
        if (newlyUnlocked.length > 0) {
          setTrophies(current);
          saveTrophyState(current);
          setNewTrophy(newlyUnlocked[0]);
          setTimeout(() => setNewTrophy(null), 4000);
        }
      }, [trophies]);

      // ── START CHAT ──
      const startChat = (bartender) => {
        const saved = JSON.parse(localStorage.getItem(`bar_${bartender.id}`) || '{"visits":0,"topics":[]}');
        const savedRec = JSON.parse(localStorage.getItem(`bar_${bartender.id}_lastrec`) || 'null');
        const v = saved.visits + 1;
        setBt(bartender); setVisitCount(v); setTopics(saved.topics || []); setLastRec(savedRec);
        setMoodMode(false); setMoodStep(0);
        const greeting = saved.visits > 5 ? (bartender.greetingRepeat || bartender.greeting) : saved.visits > 1 ? (bartender.greetingReturn || bartender.greeting) : bartender.greeting;
        setMsgs([{ role: "bt", text: greeting }]);
        setScore(0); setTotalQ(0);
        localStorage.setItem(`bar_${bartender.id}`, JSON.stringify({ visits: v, topics: saved.topics || [] }));

        // trophy stats update
        const stats = { ...trophyStats };
        stats.metBartenders = [...new Set([...(stats.metBartenders || []), bartender.id])];
        stats.maxVisits = Math.max(stats.maxVisits || 0, v);
        setTrophyStats(stats);
        localStorage.setItem("the_ash_trophy_stats", JSON.stringify(stats));
        checkTrophies(stats);
      };

      // ── SEND ──
      const sendMsg = useCallback(async (text, triggerMood = false) => {
        if (!text.trim() || loading) return;
        const isMood = triggerMood || moodModeRef.current;
        const step = moodStepRef.current;
        const nextStep = isMood ? step + 1 : 0;
        const currentBt = btRef.current;
        const currentTopics = topicsRef.current;
        const currentVisitCount = visitCountRef.current;
        const currentLastRec = lastRecRef.current;
        const currentKey = apiKeyRef.current;

        const userMsg = { role: "user", text: text.trim(), hidden: triggerMood };
        const allMsgs = [...msgsRef.current, userMsg];
        setMsgs(allMsgs); setInput(""); setLoading(true);
        if (isMood) setMoodStep(nextStep);

        const apiMsgs = allMsgs
          .map(m => ({
            role: m.role === "user" ? "user" : "assistant",
            content: m.role === "bt" && m.quiz ? `${m.text || ""}\nQUIZ:${JSON.stringify(m.quiz)}`
              : m.role === "bt" && m.rec ? `${m.message || ""}\nRECOMMEND:${JSON.stringify(m.rec)}`
              : m.text || "",
          }))
          .filter(m => m.content);

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": currentKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: buildSystem(currentBt, currentVisitCount, currentTopics, isMood, nextStep, currentLastRec, timeContext),
              messages: apiMsgs,
            }),
          });
          const data = await res.json();
          if (!res.ok) {
            const status = res.status;
            let errText = "…少し待ってくれ。";
            if (status === 401) errText = "APIキーが無効になったようだ。画面を戻って確認してくれ。";
            else if (status === 429) errText = "少し混んでるみたいだ。もう少し待ってから話しかけてくれ。";
            else if (status === 529 || status === 503) errText = "今夜はAPIが混雑している。少し時間をおいて。";
            else if (status >= 500) errText = "向こう側で何かあったみたいだ。しばらくしてからもう一度。";
            setMsgs(p => [...p, { role: "bt", text: errText }]);
            setLoading(false);
            return;
          }
          const raw = data.content?.map(c => c.text || "").join("") || "…";
          const { message, quiz, rec } = parseResponse(raw);

          const newTopics = extractTopic(text, message + (rec?.text || ""));
          const mergedTopics = [...new Set([...currentTopics, ...newTopics])].slice(-12);
          setTopics(mergedTopics);
          localStorage.setItem(`bar_${currentBt.id}`, JSON.stringify({ visits: currentVisitCount, topics: mergedTopics }));

          if (rec) {
            setLastRec({ drink: rec.drink, serve: rec.serve });
            localStorage.setItem(`bar_${currentBt.id}_lastrec`, JSON.stringify({ drink: rec.drink, serve: rec.serve }));
            setTimeout(() => { setMoodMode(false); setMoodStep(0); }, 200);

            // trophy: rec tracking
            const stats = { ...trophyStats };
            stats.totalRecs = (stats.totalRecs || 0) + 1;
            stats.recsPerBartender = { ...(stats.recsPerBartender || {}), [currentBt.id]: true };
            const drinkLower = (rec.drink + " " + (rec.text || "")).toLowerCase();
            if (drinkLower.includes("ノンアル") || drinkLower.includes("ジュース") || drinkLower.includes("ヴェルジュ") || drinkLower.includes("甘酒") || drinkLower.includes("non-alc") || drinkLower.includes("ノンアルコール")) {
              stats.nonAlcRec = true;
            }
            setTrophyStats(stats);
            localStorage.setItem("the_ash_trophy_stats", JSON.stringify(stats));
            checkTrophies(stats);
          }
          if (quiz) {
            setTotalQ(p => p + 1);
          }
          setMsgs(p => [...p, { role: "bt", message, text: message, quiz, rec, answered: false }]);
        } catch {
          setMsgs(p => [...p, { role: "bt", text: "…少し待ってくれ。" }]);
        }
        setLoading(false);
        setTimeout(() => inputRef.current?.focus(), 50);
      }, [loading, timeContext]);

      const startMoodMode = () => {
        setMoodMode(true); setMoodStep(0);
        sendMsg("今夜の気分に合った一杯を選んでほしい", true);
        setTrophyStats(prev => {
          const next = { ...prev, moodUsed: (prev.moodUsed || 0) + 1 };
          localStorage.setItem("the_ash_trophy_stats", JSON.stringify(next));
          checkTrophies(next);
          return next;
        });
      };

      const answer = useCallback((msgIdx, ci) => {
        setMsgs(prev => prev.map((m, i) => {
          if (i !== msgIdx || m.answered) return m;
          const correct = ci === m.quiz.answer;
          if (correct) {
            setScore(s => s + 1);
            setTrophyStats(prev => {
              const next = { ...prev, streak: (prev.streak || 0) + 1 };
              localStorage.setItem("the_ash_trophy_stats", JSON.stringify(next));
              checkTrophies(next);
              return next;
            });
          } else {
            setTrophyStats(prev => {
              const next = { ...prev, streak: 0 };
              localStorage.setItem("the_ash_trophy_stats", JSON.stringify(next));
              return next;
            });
          }
          return { ...m, answered: true, selected: ci };
        }));
      }, [checkTrophies]);

      const onKey = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(input); } };
      const letters = ["A","B","C","D"];
      const visibleMsgs = msgs.filter(m => !m.hidden);

      // ── KEY SCREEN ──
      if (!apiKey) return (
        <>
          <style>{css}</style>
          <div className="root">
            <div className="key-screen">
              <div className="key-box">
                <div className="key-title">The Ash</div>
                <div className="key-sub">今夜の一杯を、語りながら</div>

                <div className="key-steps">
                  <div className="key-step">
                    <div className="key-step-num">1</div>
                    <div className="key-step-text">
                      <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a> にアクセスして、Anthropicのアカウントを作成する（無料）
                    </div>
                  </div>
                  <div className="key-step">
                    <div className="key-step-num">2</div>
                    <div className="key-step-text">
                      「API Keys」→「Create Key」でキーを発行。<strong>sk-ant-</strong> から始まる文字列です
                    </div>
                  </div>
                  <div className="key-step">
                    <div className="key-step-num">3</div>
                    <div className="key-step-text">
                      下の入力欄にペーストして「入店する」を押す
                    </div>
                  </div>
                </div>

                <div className="key-label">Anthropic API Key</div>
                <div className="key-inp-wrap">
                  <input
                    className="key-inp"
                    type="password"
                    placeholder="sk-ant-api03-..."
                    value={keyInput}
                    onChange={e => setKeyInput(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && saveKey()}
                    autoFocus
                  />
                </div>
                <div className="key-note">
                  <span className="key-note-icon">🔒</span>
                  キーはこのブラウザにのみ保存されます。サーバーには一切送信されません。
                </div>
                {keyError && <div className="key-err">⚠ {keyError}</div>}
                <button className="key-btn" disabled={!keyInput.trim() || keyChecking} onClick={saveKey}>
                  {keyChecking ? "確認中…" : "入店する"}
                </button>
              </div>
            </div>
          </div>
        </>
      );

      // ── SELECT ──
      if (!bt) return (
        <>
          <style>{css}</style>
          <div className="root">
            {newTrophy && (
              <div className="trophy-toast">
                <div className="trophy-toast-icon">{newTrophy.icon}</div>
                <div className="trophy-toast-body">
                  <div className="trophy-toast-label">Trophy Unlocked</div>
                  <div className="trophy-toast-name">{newTrophy.name}</div>
                  <div className="trophy-toast-desc">{newTrophy.desc}</div>
                </div>
              </div>
            )}
            {showTrophies && (
              <div className="trophy-overlay" onClick={() => setShowTrophies(false)}>
                <div className="trophy-panel" onClick={e => e.stopPropagation()}>
                  <div className="trophy-panel-title">Trophies</div>
                  <div className="trophy-panel-sub">{Object.keys(trophies).length} / {TROPHIES.length} 解除済み</div>
                  <div className="trophy-grid">
                    {TROPHIES.map(t => (
                      <div key={t.id} className={`trophy-item ${trophies[t.id] ? "unlocked" : ""}`}>
                        <div className="trophy-item-icon">{t.icon}</div>
                        <div className="trophy-item-info">
                          <div className="trophy-item-name">{trophies[t.id] ? t.name : "???"}</div>
                          <div className="trophy-item-desc">{trophies[t.id] ? t.desc : "まだ解除されていない"}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button className="trophy-close" onClick={() => setShowTrophies(false)}>閉じる</button>
                </div>
              </div>
            )}
            <div className="sel">
              <div className="sel-label">choose your guide</div>
              <div className="sel-title">The Ash</div>
              <div className="sel-sub">今夜、誰と飲む？</div>
              <div className="bt-grid">
                {BARTENDERS.map(b => (
                  <div key={b.id} className="bt-card"
                    style={{border:`1px solid ${b.border}`,background:b.accent}}
                    onClick={() => startChat(b)}
                    onMouseOver={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 14px 36px rgba(0,0,0,0.55)";}}
                    onMouseOut={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}>
                    <div className="bt-top">
                      <div className="bt-av-init" style={{background:b.accent,border:`1px solid ${b.border}`,color:b.color}}>
                        {b.name[0]}
                      </div>
                      <div>
                        <div className="bt-name">{b.name}</div>
                        <div className="bt-title" style={{color:b.color}}>{b.title}</div>
                        <div className="bt-loc" style={{color:b.color}}>{b.location}</div>
                      </div>
                    </div>
                    <div className="bt-spec">{b.specialty}</div>
                  </div>
                ))}
              </div>
              <button className="sel-key-btn" onClick={() => { localStorage.removeItem("the_ash_key"); setApiKey(""); setKeyInput(""); }}>
                APIキーを変更する
              </button>
              <button className="trophy-btn" style={{marginTop:"10px"}} onClick={() => setShowTrophies(true)}>
                🏆 Trophies {Object.keys(trophies).length > 0 ? `(${Object.keys(trophies).length}/${TROPHIES.length})` : ""}
              </button>
            </div>
          </div>
        </>
      );

      // ── CHAT ──
      return (
        <>
          <style>{css}</style>
          <div className="root">
            {newTrophy && (
              <div className="trophy-toast">
                <div className="trophy-toast-icon">{newTrophy.icon}</div>
                <div className="trophy-toast-body">
                  <div className="trophy-toast-label">Trophy Unlocked</div>
                  <div className="trophy-toast-name">{newTrophy.name}</div>
                  <div className="trophy-toast-desc">{newTrophy.desc}</div>
                </div>
              </div>
            )}
            {showTrophies && (
              <div className="trophy-overlay" onClick={() => setShowTrophies(false)}>
                <div className="trophy-panel" onClick={e => e.stopPropagation()}>
                  <div className="trophy-panel-title">Trophies</div>
                  <div className="trophy-panel-sub">{Object.keys(trophies).length} / {TROPHIES.length} 解除済み</div>
                  <div className="trophy-grid">
                    {TROPHIES.map(t => (
                      <div key={t.id} className={`trophy-item ${trophies[t.id] ? "unlocked" : ""}`}>
                        <div className="trophy-item-icon">{t.icon}</div>
                        <div className="trophy-item-info">
                          <div className="trophy-item-name">{trophies[t.id] ? t.name : "???"}</div>
                          <div className="trophy-item-desc">{trophies[t.id] ? t.desc : "まだ解除されていない"}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button className="trophy-close" onClick={() => setShowTrophies(false)}>閉じる</button>
                </div>
              </div>
            )}
            <div className="chat">
              <div className="header" style={{borderBottomColor:bt.border}}>
                <div>
                  <div className="h-name">{bt.name}</div>
                  <div className="h-sub">{bt.location}</div>
                </div>
                <div className="h-right">
                  <div className="rel-pill">{relLabel}（{visitCount}回目）</div>
                  {totalQ > 0 && <div className="score-pill">🎯 {score}/{totalQ}</div>}
                  <button className="trophy-btn" onClick={() => setShowTrophies(true)}>🏆</button>
                  <button className="back-btn" onClick={() => setBt(null)}>← 変える</button>
                </div>
              </div>

              {moodMode && (
                <div className="mood-banner">
                  <div className="mood-pulse"/>
                  <span className="mood-label">今夜の一杯を選んでいる</span>
                  <button className="mood-exit" onClick={() => { setMoodMode(false); setMoodStep(0); }}>キャンセル</button>
                </div>
              )}

              <div className="msgs">
                {visibleMsgs.map((m, idx) => {
                  const realIdx = msgs.indexOf(m);
                  return (
                    <div key={idx} className={`row ${m.role === "user" ? "user" : ""}`}>
                      <div className={`av ${m.role === "user" ? "me" : "bt"}`}
                        style={m.role !== "user" ? {color:bt.color,borderColor:bt.border} : {}}>
                        {m.role === "user" ? "you" : bt.name.slice(0,3).toLowerCase()}
                      </div>
                      <div className="bubble">
                        {m.rec ? (
                          <>
                            {m.message && <div className="txt">{m.message}</div>}
                            <div className="rec-card">
                              <div className="rec-top">
                                <div className="rec-eyebrow">今夜の一杯</div>
                                <div className="rec-drink">{m.rec.drink}</div>
                                <div className="rec-serve">{m.rec.serve}</div>
                              </div>
                              <div className="rec-body">{m.rec.text}</div>
                            </div>
                          </>
                        ) : (
                          m.text && <div className="txt">{m.text}</div>
                        )}
                        {m.quiz && (
                          <div className="quiz">
                            <div className="quiz-lbl">── クイズ ──</div>
                            <div className="quiz-q">{m.quiz.q}</div>
                            <div className="quiz-opts">
                              {m.quiz.choices.map((c, ci) => {
                                let cls = "opt";
                                if (m.answered) cls += ci === m.quiz.answer ? " ok" : ci === m.selected ? " ng" : " dim";
                                return (
                                  <button key={ci} className={cls} disabled={m.answered} onClick={() => answer(realIdx, ci)}>
                                    <span className="ltr">{letters[ci]}</span>{c}
                                  </button>
                                );
                              })}
                            </div>
                            {m.answered && <div className="trivia">💡 {m.quiz.trivia}</div>}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
                {loading && (
                  <div className="row">
                    <div className="av bt" style={{color:bt.color,borderColor:bt.border}}>{bt.name.slice(0,3).toLowerCase()}</div>
                    <div className="bubble">
                      <div className="txt" style={{padding:"9px 15px"}}>
                        <div className="typing"><div className="dot"/><div className="dot"/><div className="dot"/></div>
                      </div>
                    </div>
                  </div>
                )}
                <div ref={bottomRef}/>
              </div>

              <div className="bottom">
                {!moodMode && (
                  <div className="hints-wrap">
                    {visibleMsgs.length <= 2 && (
                      <div className="hints">
                        {bt.hints.map((h,i) => (
                          <div key={i} className="hint" onClick={() => sendMsg(h)}>{h}</div>
                        ))}
                      </div>
                    )}
                    <button className="mood-btn" onClick={startMoodMode}>
                      <span className="mood-btn-inner">
                        <div className="mood-btn-title">今夜の気分で一杯選んでもらう</div>
                        <div className="mood-btn-sub">{bt.name} が読んで、一本を断言する</div>
                      </span>
                      <span className="mood-btn-arrow">→</span>
                    </button>
                  </div>
                )}
                <div className="inp-wrap">
                  <textarea
                    ref={inputRef}
                    className={`inp${moodMode ? " mood" : ""}`}
                    rows={1}
                    placeholder={moodMode ? "今日のこと、話してみて…" : `${bt.name}に話しかける…`}
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={onKey}
                  />
                  <button className="send" disabled={loading || !input.trim()} onClick={() => sendMsg(input)}>↑</button>
                </div>
              </div>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
